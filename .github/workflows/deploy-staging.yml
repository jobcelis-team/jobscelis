# ============================================
# Deploy to Staging: build container image and restart staging service
# Runs on: push to develop
# ============================================

name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "sdks/**"
      - "scripts/**"
      - "k6/**"
      - "LICENSE"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish-sdks.yml"
      - ".github/workflows/release.yml"

env:
  ACR_NAME: jobscelisacr
  IMAGE_NAME: jobscelis:staging
  WEBAPP_NAME: jobcelis-staging
  RESOURCE_GROUP: jobscelis-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build --registry ${{ env.ACR_NAME }} --image ${{ env.IMAGE_NAME }} .
        id: acr-build

      - name: Restart Staging Web App
        run: |
          az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Logout Azure
        if: always()
        run: az logout
