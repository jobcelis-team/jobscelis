# ============================================
# JOBSCELIS - Docker Compose
# Desarrollo: app + PostgreSQL local, o solo app con DATABASE_URL (ej. Supabase)
# Si usas solo DATABASE_URL en .env: docker-compose run --no-deps jobscelis
# ============================================

services:
  # ============================================
  # APLICACIÓN
  # ============================================

  jobscelis:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: jobscelis
    env_file:
      - .env
    environment:
      - MIX_ENV=${MIX_ENV:-dev}
      - PORT=4000
      - PHX_HOST=${PHX_HOST:-localhost}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - GUARDIAN_SECRET_KEY=${GUARDIAN_SECRET_KEY}
      - LIVE_VIEW_SIGNING_SALT=${LIVE_VIEW_SIGNING_SALT}
      # Si .env tiene DATABASE_URL (ej. Supabase), se usa; si no, BD local en servicio db
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_HOSTNAME=${DB_HOSTNAME:-db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-jobscelis_dev}
      - DB_PORT=5432
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
      - node_modules:/app/apps/streamflix_web/assets/node_modules
    networks:
      - jobscelis_network
    stdin_open: true
    tty: true

  # ============================================
  # BASE DE DATOS
  # ============================================

  db:
    image: postgres:17-alpine
    container_name: jobscelis_db
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_DATABASE:-jobscelis_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobscelis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
  deps:
  build:
  node_modules:

# ============================================
# RED
# ============================================

networks:
  jobscelis_network:
    driver: bridge
