# ============================================
# Deploy to Staging: build with cache and push to container registry
# Runs on: push to develop
# ============================================

name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "sdks/**"
      - "scripts/**"
      - "k6/**"
      - "LICENSE"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish-sdks.yml"
      - ".github/workflows/release.yml"

env:
  GHCR_IMAGE: ghcr.io/jobcelis-team/jobscelis
  IMAGE_TAG: staging
  WEBAPP_NAME: jobcelis-staging
  RESOURCE_GROUP: jobscelis-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: true
          tags: ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart Staging Web App
        run: az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Logout Azure
        if: always()
        run: az logout
