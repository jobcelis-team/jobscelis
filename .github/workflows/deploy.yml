# ============================================
# Deploy to Production: build with cache and push to container registry
# Runs on: push to main
# ============================================

name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "sdks/**"
      - "scripts/**"
      - "k6/**"
      - "LICENSE"
      - ".github/workflows/ci.yml"
      - ".github/workflows/publish-sdks.yml"
      - ".github/workflows/release.yml"

env:
  ACR_NAME: jobscelisacr
  IMAGE_NAME: jobscelis
  IMAGE_TAG: latest
  WEBAPP_NAME: jobcelis
  RESOURCE_GROUP: jobscelis-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restart Web App
        run: az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Logout Azure
        if: always()
        run: az logout
